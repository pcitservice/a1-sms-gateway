# =============================================================================
# A1 SMS Gateway — in-stack Nginx vhost
# Serves plain HTTP on :80 (bound to the host loopback). A fronting webserver
# (CyberPanel/OpenLiteSpeed, host Nginx, or Cloudflare Tunnel) terminates TLS
# and proxies inbound traffic to this listener.
# =============================================================================

upstream a1sms_api { server api:8000; keepalive 32; }
upstream a1sms_web { server web:3000; keepalive 32; }

server {
    listen      80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25M;

    # Laravel API + Sanctum + Horizon + Swagger.
    location ~ ^/(api|sanctum|horizon|telescope|api/documentation|docs\.json) {
        proxy_pass         http://a1sms_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 120s;
    }

    # Everything else → Next.js.
    location / {
        proxy_pass         http://a1sms_web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }
}
