# =============================================================================
# A1 SMS Gateway — in-stack Nginx vhost
# Mounted into the nginx container. The host-side vhost (deploy/nginx/) is
# preferred when host Nginx exists; this is the fallback used by Compose.
# =============================================================================

upstream a1sms_api { server api:8000;  keepalive 32; }
upstream a1sms_web { server web:3000;  keepalive 32; }

# HTTP → HTTPS redirect (skipped if certs absent: the server still serves).
server {
    listen      80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ACME challenge for certbot.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # When the cert exists, send everyone to HTTPS. Otherwise serve plain.
    location / {
        if (-f /etc/letsencrypt/live/${HOST:-sms.a1techflow.com}/fullchain.pem) {
            return 301 https://$host$request_uri;
        }
        proxy_pass         http://a1sms_web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen      443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    # Falls back to a snake-oil cert baked into the image if Let's Encrypt
    # hasn't issued yet; the included paths below win once certbot writes them.
    ssl_certificate     /etc/nginx/snakeoil/fullchain.pem;
    ssl_certificate_key /etc/nginx/snakeoil/privkey.pem;
    include             /etc/nginx/conf.d/letsencrypt.inc*;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # OWASP-ish security headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # Laravel API + Sanctum + Horizon + Swagger.
    location ~ ^/(api|sanctum|horizon|telescope|api/documentation|docs.json) {
        proxy_pass         http://a1sms_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 120s;
    }

    # Everything else → Next.js.
    location / {
        proxy_pass         http://a1sms_web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }
}
