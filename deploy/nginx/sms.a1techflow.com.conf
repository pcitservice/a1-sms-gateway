# =============================================================================
# A1 SMS Gateway — host-side Nginx vhost
# Installed by install.sh into /etc/nginx/sites-available/ and symlinked.
# The host Nginx terminates TLS and reverse-proxies into the Docker stack on
# loopback ports (NGINX_HTTP_PORT / NGINX_HTTPS_PORT from .env).
# =============================================================================

upstream a1sms_stack {
    server 127.0.0.1:8181;
    keepalive 32;
}

server {
    listen      80;
    listen [::]:80;
    server_name sms.a1techflow.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen      443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sms.a1techflow.com;

    ssl_certificate     /etc/letsencrypt/live/sms.a1techflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sms.a1techflow.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 25M;

    location / {
        proxy_pass         http://a1sms_stack;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
