# OpenLiteSpeed rewrite rules for sms.a1techflow.com
# Paste in: CyberPanel → Websites → Manage → Rewrite Rules → Custom

RewriteEngine On

# Let CyberPanel/OLS keep serving Let's Encrypt's HTTP-01 challenge during
# automatic cert renewals — don't proxy that path.
RewriteRule ^/\.well-known/acme-challenge/ - [L]

# Force HTTPS for everything else.
RewriteCond %{HTTPS} !on
RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
