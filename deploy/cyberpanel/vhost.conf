# OpenLiteSpeed vHost snippet — paste at the end of the vHost Conf for
# sms.a1techflow.com in CyberPanel, then click "Save" and restart OLS.
#
# This declares an external HTTP backend pointing at the Docker stack's
# internal nginx (bound to 127.0.0.1:8181 by docker-compose.yml) and
# tells OLS to forward EVERY request path to it.

extprocessor a1sms {
  type                    proxy
  address                 127.0.0.1:8181
  maxConns                500
  pcKeepAliveTimeout      60
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}

context / {
  type                    proxy
  handler                 a1sms
  addDefaultCharset       off

  # Forward the real visitor IP and protocol so Laravel can render correct
  # links and rate-limit per real source IP rather than 127.0.0.1.
  extraHeaders            <<<END_extraHeaders
X-Forwarded-For $remote_addr
X-Forwarded-Proto $scheme
X-Real-IP $remote_addr
Host $host
END_extraHeaders
}
