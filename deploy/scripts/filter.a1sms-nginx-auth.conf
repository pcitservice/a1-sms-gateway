# Place at /etc/fail2ban/filter.d/a1sms-nginx-auth.conf
# Matches 401/403/429 from the Nginx access log for our auth/API endpoints.
[Definition]
failregex = ^<HOST> -.*"(GET|POST) /api/v1/auth/(login|signup|reset-password|forgot-password).*" (401|403|429) .*$
            ^<HOST> -.*"(GET|POST) /api/v1/.*" 429 .*$
ignoreregex =
datepattern = %%d/%%b/%%Y:%%H:%%M:%%S %%z
