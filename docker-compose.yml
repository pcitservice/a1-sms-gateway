name: a1-sms

x-restart: &restart
  restart: unless-stopped

networks:
  a1sms:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  api_storage:
  certbot_etc:
  certbot_www:

services:
  postgres:
    image: postgres:16-alpine
    <<: *restart
    environment:
      POSTGRES_USER: ${DB_USERNAME:-a1sms}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_DB: ${DB_DATABASE:-a1sms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5532}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-a1sms}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [a1sms]

  redis:
    image: redis:7-alpine
    <<: *restart
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6479}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [a1sms]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    <<: *restart
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-a1sms}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change-me}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "127.0.0.1:${RABBITMQ_PORT:-5772}:5672"
      - "127.0.0.1:${RABBITMQ_UI_PORT:-15772}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks: [a1sms]

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: a1-sms-laravel:latest
    <<: *restart
    env_file: .env
    environment:
      CONTAINER_ROLE: api
    volumes:
      - api_storage:/var/www/html/storage
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    ports:
      - "127.0.0.1:${API_PORT:-8100}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [a1sms]

  # The next three services share the api image. Building happens only in `api`.
  scheduler:
    image: a1-sms-laravel:latest
    <<: *restart
    env_file: .env
    environment:
      CONTAINER_ROLE: scheduler
    volumes:
      - api_storage:/var/www/html/storage
    depends_on:
      api: { condition: service_healthy }
    networks: [a1sms]

  worker:
    image: a1-sms-laravel:latest
    <<: *restart
    env_file: .env
    environment:
      CONTAINER_ROLE: worker
    volumes:
      - api_storage:/var/www/html/storage
    depends_on:
      api: { condition: service_healthy }
    deploy:
      replicas: 2
    networks: [a1sms]

  horizon:
    image: a1-sms-laravel:latest
    <<: *restart
    env_file: .env
    environment:
      CONTAINER_ROLE: horizon
    volumes:
      - api_storage:/var/www/html/storage
    depends_on:
      api: { condition: service_healthy }
    networks: [a1sms]

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8100/api/v1}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-A1 SMS Gateway}
        NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY:-}
    <<: *restart
    env_file: .env
    ports:
      - "127.0.0.1:${WEB_PORT:-3100}:3000"
    depends_on:
      api: { condition: service_healthy }
    networks: [a1sms]

  nginx:
    image: nginx:1.27-alpine
    <<: *restart
    # Bound to loopback so a fronting webserver (CyberPanel/OpenLiteSpeed,
    # standalone Nginx, Cloudflare Tunnel, etc.) is the only public ingress.
    ports:
      - "127.0.0.1:${NGINX_HTTP_PORT:-8181}:80"
      - "127.0.0.1:${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_etc:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      api: { condition: service_healthy }
      web: { condition: service_started }
    networks: [a1sms]
